name: Deploy Location Picker Worker

on:
  push:
    branches:
      - main
    paths:
      - "location-picker/worker/**"
      - ".github/workflows/deploy-location-picker-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: location-picker/worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: location-picker/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Wrangler config
        run: |
          node - <<'NODE'
          const fs = require('fs');

          const kvNamespaceId = process.env.CLOUDFLARE_KV_NAMESPACE_ID;
          const kvPreviewNamespaceId = process.env.CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID;

          if (!kvNamespaceId) {
            throw new Error('CLOUDFLARE_KV_NAMESPACE_ID repository variable is required');
          }

          if (!kvPreviewNamespaceId) {
            throw new Error('CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID repository variable is required');
          }

          const config = {
            name: 'ios-location-picker',
            main: 'src/index.js',
            compatibility_date: '2026-01-01',
            workers_dev: true,
            kv_namespaces: [
              {
                binding: 'LOC_KV',
                id: kvNamespaceId,
                preview_id: kvPreviewNamespaceId
              }
            ]
          };

          fs.writeFileSync('wrangler.ci.jsonc', `${JSON.stringify(config, null, 2)}\n`);
          NODE
        env:
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ vars.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID: ${{ vars.CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID }}

      - name: Deploy Cloudflare Worker
        run: npx wrangler deploy --config wrangler.ci.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
