name: Deploy Location Picker Worker

on:
  push:
    branches:
      - main
    paths:
      - "location-picker/worker/**"
      - ".github/workflows/deploy-location-picker-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: location-picker/worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: location-picker/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Cloudflare Worker
        run: npx wrangler deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
